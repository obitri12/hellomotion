<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HelloMotion High School Malang — SMA Kreatif Pertama di Indonesia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
/* ============================================================
   HelloMotion High School — Brand Tokens
   Derived from PPDB 2026/2027 poster
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Caveat:wght@400;700&display=swap');

:root {
  /* Brand palette — exact hex from poster */
  --hm-pink: #E66571;
  --hm-pink-deep: #D94A5A;
  --hm-pink-soft: #F7C2C9;
  --hm-pink-tint: #FDEBED;

  --hm-yellow: #F4B232;
  --hm-yellow-deep: #E89A10;
  --hm-yellow-soft: #FBE3A8;
  --hm-yellow-tint: #FEF6E0;

  --hm-mint: #35BE92;
  --hm-mint-deep: #1D9E76;
  --hm-mint-soft: #A4E6CE;
  --hm-mint-tint: #E3F7EE;

  --hm-navy: #0F3A48;           /* primary text / headlines */
  --hm-navy-2: #1A5567;         /* secondary text */
  --hm-ink: #0A252F;            /* near-black */

  --hm-cream: #FFF8EA;          /* warm page background */
  --hm-paper: #FFFFFF;
  --hm-muted: #6B8390;
  --hm-border: #E8DFCC;

  /* Semantic */
  --bg-page: var(--hm-cream);
  --bg-card: var(--hm-paper);
  --fg-1: var(--hm-navy);
  --fg-2: var(--hm-navy-2);
  --fg-3: var(--hm-muted);
  --accent: var(--hm-pink);

  /* Type */
  --font-display: 'Onest', system-ui, sans-serif;
  --font-body: 'Onest', system-ui, sans-serif;
  --font-accent: 'Caveat', cursive;       /* for playful doodle labels */
  --font-serif: 'Fraunces', serif;        /* optional editorial accent */

  /* Radii */
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-2xl: 36px;
  --r-pill: 9999px;

  /* Shadows */
  --sh-sm: 0 2px 6px rgba(15, 58, 72, 0.06);
  --sh-md: 0 10px 24px rgba(15, 58, 72, 0.08);
  --sh-lg: 0 22px 50px rgba(15, 58, 72, 0.12);
  --sh-pop: 0 6px 0 0 rgba(15, 58, 72, 0.14);  /* hard shadow for poster vibe */

  /* Motion */
  --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
}

/* Dark mode — swapped neutrals, brand colors stay saturated */
[data-theme="dark"] {
  --bg-page: #0B1E26;
  --bg-card: #112B35;
  --fg-1: #F4EFE0;
  --fg-2: #D1DCE2;
  --fg-3: #8FA3AC;
  --hm-cream: #0B1E26;
  --hm-paper: #112B35;
  --hm-border: #1E3B47;
  --hm-navy: #F4EFE0;
  --hm-navy-2: #D1DCE2;
  --sh-sm: 0 2px 6px rgba(0,0,0,0.3);
  --sh-md: 0 10px 24px rgba(0,0,0,0.4);
  --sh-lg: 0 22px 50px rgba(0,0,0,0.5);
  --sh-pop: 0 6px 0 0 rgba(0,0,0,0.4);
}

/* Base */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-body);
  color: var(--fg-1);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
}

img { max-width: 100%; display: block; }

a { color: inherit; text-decoration: none; }

button { font-family: inherit; cursor: pointer; border: none; background: none; }

h1, h2, h3, h4, h5 {
  font-family: var(--font-display);
  color: var(--fg-1);
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1.05;
  font-weight: 800;
}

p { margin: 0; color: var(--fg-2); }

::selection { background: var(--hm-yellow); color: var(--hm-navy); }

/* Utility buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  border-radius: var(--r-pill);
  font-weight: 700;
  font-size: 15px;
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), background 0.2s;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: var(--hm-pink);
  color: white;
  box-shadow: var(--sh-pop);
}
.btn-primary:hover { background: var(--hm-pink-deep); }

.btn-secondary {
  background: var(--hm-navy);
  color: var(--hm-cream);
}
[data-theme="dark"] .btn-secondary {
  background: var(--hm-yellow);
  color: var(--hm-ink);
}

.btn-yellow {
  background: var(--hm-yellow);
  color: var(--hm-navy);
  box-shadow: var(--sh-pop);
}
.btn-yellow:hover { background: var(--hm-yellow-deep); }

.btn-ghost {
  background: transparent;
  color: var(--fg-1);
  border: 2px solid var(--hm-navy);
}
[data-theme="dark"] .btn-ghost { border-color: var(--fg-1); }

.btn-sm { padding: 10px 18px; font-size: 14px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 600;
  background: var(--hm-paper);
  color: var(--hm-navy);
  border: 1.5px solid var(--hm-border);
}
.chip-pink { background: var(--hm-pink); color: white; border-color: transparent; }
.chip-yellow { background: var(--hm-yellow); color: var(--hm-navy); border-color: transparent; }
.chip-mint { background: var(--hm-mint); color: white; border-color: transparent; }

/* Container */
.container {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 28px;
}

/* Section head pattern */
.section-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-accent);
  font-size: 28px;
  font-weight: 700;
  color: var(--hm-pink);
  transform: rotate(-2deg);
}

.section-title {
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 900;
  line-height: 1.02;
  letter-spacing: -0.03em;
  color: var(--fg-1);
  margin-top: 8px;
}

/* Yellow/pink/mint highlight pills (matching poster) */
.hl-pill {
  display: inline-block;
  padding: 0 14px;
  border-radius: 14px;
  white-space: nowrap;
}
.hl-yellow { background: var(--hm-yellow); color: var(--hm-navy); }
.hl-pink   { background: var(--hm-pink);   color: white; }
.hl-mint   { background: var(--hm-mint);   color: white; }

/* Hide scrollbar on horizontal scrollers */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Shapes (organic blobs) */
.shape {
  position: absolute;
  pointer-events: none;
  z-index: 0;
}

/* Focus ring */
:focus-visible {
  outline: 3px solid var(--hm-pink);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Sticky note scribble marks (the "???" squiggles in poster) */
.scribble {
  font-family: var(--font-accent);
  color: var(--hm-navy);
  font-weight: 700;
  transform: rotate(-12deg);
  display: inline-block;
}

/* ============================================================
   HelloMotion — Page Layout & Sections
   ============================================================ */

/* ─── NAV ─────────────────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 14px 0;
  transition: background 0.3s, backdrop-filter 0.3s, box-shadow 0.3s;
}
.nav--scrolled {
  background: color-mix(in oklab, var(--bg-page) 82%, transparent);
  backdrop-filter: blur(14px);
  box-shadow: 0 1px 0 var(--hm-border);
}
.nav__inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.nav__brand { display: flex; align-items: center; gap: 12px; }
.nav__logomark { display: inline-flex; }
.nav__wordmark { display: flex; flex-direction: column; line-height: 1; }
.nav__wordmark strong { font-size: 18px; font-weight: 800; color: var(--fg-1); letter-spacing: -0.02em; }
.nav__wordmark small { font-size: 11px; color: var(--fg-3); font-weight: 500; margin-top: 3px; }

.nav__links { display: flex; align-items: center; gap: 4px; }
.nav__link {
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 600;
  color: var(--fg-2);
  border-radius: var(--r-pill);
  transition: background 0.2s, color 0.2s;
}
.nav__link:hover { background: var(--hm-yellow-tint); color: var(--fg-1); }
.nav__cta { margin-left: 10px; }
.nav__burger { display: none; flex-direction: column; gap: 5px; width: 40px; height: 40px; justify-content: center; align-items: center; }
.nav__burger span { display: block; width: 22px; height: 2.5px; background: var(--fg-1); border-radius: 2px; }

@media (max-width: 880px) {
  .nav__burger { display: flex; }
  .nav__links {
    position: absolute; top: 68px; left: 12px; right: 12px;
    flex-direction: column; align-items: stretch; gap: 4px;
    padding: 14px; border-radius: var(--r-xl);
    background: var(--bg-card); box-shadow: var(--sh-lg);
    transform: translateY(-8px); opacity: 0; pointer-events: none;
    transition: transform 0.25s, opacity 0.25s;
  }
  .nav__links--open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .nav__link { text-align: left; padding: 12px 16px; }
  .nav__cta { margin: 4px 0 0 0; justify-content: center; }
  .nav__wordmark small { display: none; }
}

/* ─── HERO ────────────────────────────────────────────── */
.hero {
  position: relative;
  padding: 130px 0 60px;
  overflow: hidden;
}
.hero__shapes { position: absolute; inset: 0; pointer-events: none; }
.blob { position: absolute; border-radius: 50%; filter: blur(0.5px); }
.blob--mint   { top: 90px;  left: -120px; width: 280px; height: 280px; background: var(--hm-mint); opacity: 0.85; }
.blob--pink   { top: 40%;   right: -100px; width: 340px; height: 340px; background: var(--hm-pink); opacity: 0.18; }
.blob--yellow { bottom: 40px; left: 38%; width: 180px; height: 180px; background: var(--hm-yellow); opacity: 0.55; }

.squiggle { position: absolute; width: 80px; height: 40px; }
.squiggle--1 { top: 150px; right: 8%; transform: rotate(-8deg); }
.squiggle--2 { bottom: 18%; left: 6%; width: 60px; height: 60px; transform: rotate(6deg); }

.star { position: absolute; font-size: 36px; color: var(--hm-pink); font-weight: 900; }
.star--1 { top: 22%; left: 44%; transform: rotate(12deg); color: var(--hm-yellow); }
.star--2 { top: 55%; right: 6%; font-size: 28px; color: var(--hm-mint); }

.hero__grid {
  position: relative; z-index: 2;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 60px;
  align-items: center;
}
@media (max-width: 960px) { .hero__grid { grid-template-columns: 1fr; gap: 40px; } }

.hero__badge { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.badge-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: var(--r-pill);
  background: var(--hm-navy); color: var(--hm-cream);
  font-size: 13px; font-weight: 600;
}
[data-theme="dark"] .badge-pill { background: var(--hm-yellow); color: var(--hm-ink); }
.hero__scribble { font-size: 26px; color: var(--hm-pink); }

.hero__headline {
  font-size: clamp(44px, 7.2vw, 88px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.035em;
  display: flex; flex-wrap: wrap; gap: 8px 14px;
}
.hero__headline span { display: inline-block; }
.hero__headline em { font-style: normal; }

.hero__sub {
  margin-top: 24px;
  font-size: 18px;
  line-height: 1.55;
  color: var(--fg-2);
  max-width: 560px;
}
.hero__sub strong { color: var(--fg-1); font-weight: 700; }

.hero__ctas { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 32px; }

.hero__stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 24px; margin-top: 44px;
  padding-top: 28px;
  border-top: 2px dashed var(--hm-border);
}
.hero__stat { display: flex; flex-direction: column; gap: 4px; }
.hero__stat strong { font-size: 32px; font-weight: 900; color: var(--hm-pink); letter-spacing: -0.03em; }
.hero__stat span { font-size: 13px; color: var(--fg-3); font-weight: 500; }

/* Hero visual */
.hero__visual { position: relative; }
.hero__photo-wrap {
  position: relative;
  aspect-ratio: 4/5;
  max-width: 520px;
  margin: 0 auto;
}
.hero__photo-bg {
  position: absolute; inset: 0;
  background: var(--hm-yellow);
  border-radius: 45% 55% 60% 40% / 50% 45% 55% 50%;
  transform: rotate(-4deg);
}
.hero__photo {
  position: relative;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 45% 55% 60% 40% / 50% 45% 55% 50%;
  filter: saturate(1.05) contrast(1.02);
}
.hero__chip {
  position: absolute;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px;
  background: var(--bg-card);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-lg);
  z-index: 3;
}
.hero__chip i { font-size: 22px; color: var(--hm-pink); }
.hero__chip small { display: block; font-size: 11px; color: var(--fg-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.hero__chip strong { display: block; font-size: 13px; color: var(--fg-1); font-weight: 700; margin-top: 2px; }
.hero__chip--1 { top: 8%; left: -8%; animation: floaty 6s ease-in-out infinite; }
.hero__chip--2 { bottom: 12%; right: -6%; animation: floaty 6s ease-in-out infinite 3s; }
.hero__chip--2 i { color: var(--hm-mint); }
.hero__pill {
  position: absolute; top: -14px; right: 18%;
  background: var(--hm-pink); color: white;
  padding: 6px 16px; border-radius: var(--r-pill);
  font-weight: 700; font-size: 13px;
  transform: rotate(6deg);
  box-shadow: var(--sh-pop);
}

@keyframes floaty {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Marquee */
.marquee {
  position: relative; z-index: 2;
  margin-top: 60px;
  padding: 14px 0;
  background: var(--hm-navy);
  color: var(--hm-cream);
  overflow: hidden;
  transform: rotate(-1.5deg);
  margin-left: -20px; margin-right: -20px;
}
[data-theme="dark"] .marquee { background: var(--hm-yellow); color: var(--hm-ink); }
.marquee__track {
  display: flex;
  animation: marquee 40s linear infinite;
  width: max-content;
}
.marquee__group {
  display: flex; gap: 40px; padding-right: 40px;
  font-weight: 700; font-size: 18px;
  white-space: nowrap;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-33.333%); }
}

/* ─── SECTION BASE ─────────────────────────────────────── */
.section { padding: 100px 0; position: relative; }

/* Stitch divider (per sketch tips) */
.stitch {
  height: 2px;
  background-image: linear-gradient(to right, var(--hm-navy) 60%, transparent 40%);
  background-size: 16px 2px;
  background-repeat: repeat-x;
  opacity: 0.25;
  margin: 0 auto;
  max-width: 1240px;
}

/* ─── CURRICULUM / DOUBLE DIPLOMA ──────────────────────── */
.curriculum { background: var(--hm-pink-tint); border-radius: 0; }
[data-theme="dark"] .curriculum { background: color-mix(in oklab, var(--hm-pink) 18%, var(--bg-page)); }

.curriculum__grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
}
@media (max-width: 900px) { .curriculum__grid { grid-template-columns: 1fr; gap: 40px; } }

.diploma-stack { position: relative; padding: 20px; }
.diploma {
  background: var(--bg-card);
  border-radius: var(--r-xl);
  padding: 28px 30px;
  box-shadow: var(--sh-lg);
  border: 2px solid var(--hm-navy);
  position: relative;
}
.diploma + .diploma { margin-top: -30px; margin-left: 40px; }
.diploma__ribbon {
  display: inline-block;
  padding: 4px 12px;
  background: var(--hm-pink); color: white;
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  border-radius: 4px;
  margin-bottom: 14px;
}
.diploma--2 .diploma__ribbon { background: var(--hm-yellow); color: var(--hm-navy); }
.diploma h4 { font-size: 22px; margin: 0 0 6px; }
.diploma p { font-size: 14px; color: var(--fg-3); }
.diploma__seal {
  position: absolute; right: 20px; bottom: 20px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--hm-mint); color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-accent);
  font-size: 22px; font-weight: 700;
  transform: rotate(-12deg);
  border: 2px dashed white;
  box-shadow: 0 0 0 2px var(--hm-mint);
}

.curr-list { list-style: none; padding: 0; margin: 28px 0 0; display: grid; gap: 14px; }
.curr-list li {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 18px; background: var(--bg-card);
  border-radius: var(--r-lg);
  border: 1.5px solid var(--hm-border);
}
.curr-list li .dot {
  flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: white; font-size: 14px;
}
.curr-list li:nth-child(1) .dot { background: var(--hm-pink); }
.curr-list li:nth-child(2) .dot { background: var(--hm-yellow); color: var(--hm-navy); }
.curr-list li:nth-child(3) .dot { background: var(--hm-mint); }
.curr-list li:nth-child(4) .dot { background: var(--hm-navy); }
.curr-list li strong { display: block; font-size: 15px; color: var(--fg-1); font-weight: 700; }
.curr-list li small { display: block; font-size: 13px; color: var(--fg-3); margin-top: 2px; }

/* ─── CREATIVE FACTORY ─────────────────────────────────── */
.factory { background: var(--hm-navy); color: var(--hm-cream); overflow: hidden; }
.factory .section-title, .factory .section-eyebrow { color: var(--hm-cream); }
.factory .section-eyebrow { color: var(--hm-yellow); }
[data-theme="dark"] .factory { background: color-mix(in oklab, var(--hm-navy) 55%, black); }

.factory__head { max-width: 700px; }
.factory__head p { color: color-mix(in oklab, var(--hm-cream) 75%, transparent); font-size: 17px; margin-top: 20px; }

.factory__grid {
  margin-top: 48px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
@media (max-width: 900px) { .factory__grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px) { .factory__grid { grid-template-columns: 1fr; } }

.factory-card {
  background: color-mix(in oklab, var(--hm-cream) 8%, transparent);
  border: 1.5px solid color-mix(in oklab, var(--hm-cream) 20%, transparent);
  border-radius: var(--r-xl);
  padding: 24px;
  transition: transform 0.25s var(--ease-out), background 0.25s;
  position: relative; overflow: hidden;
}
.factory-card:hover { transform: translateY(-6px); background: color-mix(in oklab, var(--hm-cream) 14%, transparent); }
.factory-card__icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
}
.factory-card:nth-child(1) .factory-card__icon { background: var(--hm-pink); color: white; }
.factory-card:nth-child(2) .factory-card__icon { background: var(--hm-yellow); color: var(--hm-navy); }
.factory-card:nth-child(3) .factory-card__icon { background: var(--hm-mint); color: white; }
.factory-card:nth-child(4) .factory-card__icon { background: var(--hm-cream); color: var(--hm-navy); }

.factory-card h4 { font-size: 20px; margin: 0 0 8px; color: var(--hm-cream); }
.factory-card p { font-size: 14px; color: color-mix(in oklab, var(--hm-cream) 70%, transparent); line-height: 1.5; }
.factory-card__num {
  position: absolute; top: 16px; right: 20px;
  font-size: 14px; font-weight: 800; opacity: 0.35;
}
.factory__benefit {
  margin-top: 40px; padding: 24px 28px;
  background: var(--hm-yellow); color: var(--hm-navy);
  border-radius: var(--r-xl);
  display: flex; align-items: center; gap: 18px;
  font-weight: 600; font-size: 16px;
}
.factory__benefit i { font-size: 28px; }

/* ─── MAPEL (SUBJECTS) ─────────────────────────────────── */
.subjects__split {
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
  margin-top: 56px;
}
@media (max-width: 900px) { .subjects__split { grid-template-columns: 1fr; } }

.subject-col {
  background: var(--bg-card);
  border-radius: var(--r-2xl);
  padding: 36px;
  border: 2px solid var(--hm-border);
  position: relative;
}
.subject-col--creative { background: var(--hm-pink); color: white; border-color: var(--hm-pink-deep); }
.subject-col--academic { background: var(--hm-mint); color: white; border-color: var(--hm-mint-deep); }
.subject-col h3 { color: inherit; font-size: 28px; margin: 0 0 8px; }

/* ── Nav ─────────────────────────────────────── */
const Nav = ({ onOpenTweaks }) => {
  const [scrolled, setScrolled] = React.useState(false);
  const [open, setOpen] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = [
    ['Tentang', 'about'],
    ['Kurikulum', 'curriculum'],
    ['Creative Factory', 'factory'],
    ['Kehidupan', 'life'],
    ['Alumni', 'alumni'],
    ['FAQ', 'faq'],
  ];

  const go = (id) => {
    setOpen(false);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <nav className={`nav ${scrolled ? 'nav--scrolled' : ''}`}>
      <div className="nav__inner container">
        <a className="nav__brand" href="#top" onClick={(e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
          <span className="nav__logomark">
            <svg viewBox="0 0 40 40" width="40" height="40">
              <circle cx="20" cy="20" r="19" fill="var(--hm-yellow)" />
              <circle cx="14" cy="17" r="2.2" fill="var(--hm-navy)" />
              <circle cx="26" cy="17" r="2.2" fill="var(--hm-navy)" />
              <path d="M13 24 Q20 30 27 24" stroke="var(--hm-navy)" strokeWidth="2.5" fill="none" strokeLinecap="round" />
            </svg>
          </span>
          <span className="nav__wordmark">
            <strong>HelloMotion</strong>
            <small>High School Malang</small>
          </span>
        </a>

        <div className={`nav__links ${open ? 'nav__links--open' : ''}`}>
          {links.map(([label, id]) => (
            <button key={id} className="nav__link" onClick={() => go(id)}>{label}</button>
          ))}
          <button className="btn btn-primary btn-sm nav__cta" onClick={() => go('daftar')}>
            Daftar PPDB <i className="bi bi-arrow-right"></i>
          </button>
        </div>

        <button className="nav__burger" onClick={() => setOpen(o => !o)} aria-label="menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  );
};

/* ── Daftar ─────────────────────────────────────── */
const Daftar = () => {
  const [form, setForm] = React.useState({
    nama: '', email: '', phone: '', smp: '', minat: '', catatan: ''
  });
  const [errors, setErrors] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);

  const set = (k) => (e) => setForm(s => ({ ...s, [k]: e.target.value }));

  const validate = () => {
    const e = {};
    if (!form.nama.trim()) e.nama = 'Nama wajib diisi';
    if (!form.email.match(/^\S+@\S+\.\S+$/)) e.email = 'Email tidak valid';
    if (!form.phone.match(/^[0-9+\-\s]{8,}$/)) e.phone = 'No. WhatsApp tidak valid';
    if (!form.smp.trim()) e.smp = 'Asal SMP wajib diisi';
    if (!form.minat) e.minat = 'Pilih minat program';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = (ev) => {
    ev.preventDefault();
    if (validate()) setSubmitted(true);
  };

  return (
    <section id="daftar" className="section daftar">
      <div className="daftar__shapes" aria-hidden="true">
        <div className="s" style={{top: '10%', left: '-5%', width: 220, height: 220, background: 'rgba(255,255,255,0.08)'}}></div>
        <div className="s" style={{bottom: '5%', right: '-3%', width: 180, height: 180, background: 'var(--hm-yellow)', opacity: 0.2}}></div>
      </div>

      <div className="container daftar__grid">
        <div className="daftar__promo">
          <span className="section-eyebrow">Final CTA 🎓</span>
          <h2 className="section-title" style={{color: 'white'}}>
            <em className="hl-pill hl-yellow">ENROLL NOW!</em><br/>
            Kuota terbatas.
          </h2>
          <p style={{marginTop: 20, fontSize: 17, color: 'rgba(255,255,255,0.9)', maxWidth: 480}}>
            Dapatkan promo gelombang 1: gratis biaya formulir + diskon SPP hingga 25%.
            Formulir online hanya 3 menit.
          </p>

          <div className="daftar__promo-highlights">
            <div className="promo-row">
              <div className="promo-row__icon"><i className="bi bi-ticket-perforated-fill"></i></div>
              <div>
                <strong>Gratis biaya formulir</strong>
                <small>Pendaftaran online tanpa biaya admin</small>
              </div>
            </div>
            <div className="promo-row">
              <div className="promo-row__icon"><i className="bi bi-percent"></i></div>
              <div>
                <strong>Diskon SPP 25%</strong>
                <small>Khusus pendaftar gelombang 1 (sampai 30 Juni 2026)</small>
              </div>
            </div>
            <div className="promo-row">
              <div className="promo-row__icon"><i className="bi bi-tablet-fill"></i></div>
              <div>
                <strong>Free iPad untuk siswa baru</strong>
                <small>Jadi milik siswa setelah 3 tahun masa studi</small>
              </div>
            </div>
          </div>
        </div>

        <div className="form-card">
          {!submitted ? (
            <>
              <h3>Formulir Pendaftaran</h3>
              <p>Tim admisi akan menghubungi kamu dalam 1×24 jam kerja.</p>
              <form onSubmit={submit} noValidate>
                <div className="form-row">
                  <div className={`field ${errors.nama ? 'error' : ''}`}>
                    <label>Nama Lengkap Calon Siswa</label>
                    <input type="text" value={form.nama} onChange={set('nama')} placeholder="mis. Dimas Prasetya"/>
                    {errors.nama && <div className="field__err">{errors.nama}</div>}
                  </div>
                </div>
                <div className="form-row form-row--2">
                  <div className={`field ${errors.email ? 'error' : ''}`}>
                    <label>Email orang tua / wali</label>
                    <input type="email" value={form.email} onChange={set('email')} placeholder="nama@email.com"/>
                    {errors.email && <div className="field__err">{errors.email}</div>}
                  </div>
                  <div className={`field ${errors.phone ? 'error' : ''}`}>
                    <label>No. WhatsApp aktif</label>
                    <input type="tel" value={form.phone} onChange={set('phone')} placeholder="0822 xxxx xxxx"/>
                    {errors.phone && <div className="field__err">{errors.phone}</div>}
                  </div>

/* ── App ─────────────────────────────────────── */
const TWEAK_DEFAULTS = {
  "theme": "light",
  "accent": "pink"
};

const ACCENTS = {
  pink:   { '--hm-pink': '#E66571', '--hm-pink-deep': '#D94A5A', '--hm-pink-tint': '#FDEBED', '--hm-pink-soft': '#F7C2C9' },
  violet: { '--hm-pink': '#8B5CF6', '--hm-pink-deep': '#7C3AED', '--hm-pink-tint': '#F3EEFF', '--hm-pink-soft': '#D7C7FB' },
  coral:  { '--hm-pink': '#FF6B4A', '--hm-pink-deep': '#EB4D2C', '--hm-pink-tint': '#FFEAE2', '--hm-pink-soft': '#FFC4B2' },
  blue:   { '--hm-pink': '#3B82F6', '--hm-pink-deep': '#2563EB', '--hm-pink-tint': '#E7F0FE', '--hm-pink-soft': '#B8D1FA' },
};

function applyTweaks(t) {
  document.documentElement.setAttribute('data-theme', t.theme === 'dark' ? 'dark' : 'light');
  const accent = ACCENTS[t.accent] || ACCENTS.pink;
  Object.entries(accent).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
}

const TweaksPanel = ({ tweaks, setTweaks, onClose }) => {
  const setKey = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    applyTweaks(next);
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
  };

  return (
    <div className="tweaks">
      <div className="tweaks__head">
        <strong>🎨 Tweaks</strong>
        <button onClick={onClose} aria-label="close"><i className="bi bi-x-lg"></i></button>
      </div>
      <div className="tweaks__body">
        <div className="tweak-row">
          <label>Warna aksen</label>
          <div className="swatches">
            {Object.entries(ACCENTS).map(([k, v]) => (
              <button key={k}
                className={`swatch ${tweaks.accent === k ? 'is-active' : ''}`}
                style={{ background: v['--hm-pink'] }}
                onClick={() => setKey('accent', k)}
                aria-label={k}/>
            ))}
          </div>
        </div>
        <div className="tweak-row toggle-row">
          <span><i className={`bi bi-${tweaks.theme === 'dark' ? 'moon-stars-fill' : 'sun-fill'}`}></i> Dark mode</span>
          <button className={`toggle ${tweaks.theme === 'dark' ? 'is-on' : ''}`}
                  onClick={() => setKey('theme', tweaks.theme === 'dark' ? 'light' : 'dark')}
                  aria-label="dark mode"/>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => {
    applyTweaks(TWEAK_DEFAULTS);

    const onMsg = (ev) => {
      const d = ev.data || {};
      if (d.type === '__activate_edit_mode') setShowTweaks(true);
      if (d.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}

    // reveal on scroll
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.12 });
    document.querySelectorAll('.section, .hero__copy, .hero__visual').forEach(el => {
      el.classList.add('reveal');
      io.observe(el);
    });

    return () => { window.removeEventListener('message', onMsg); io.disconnect(); };
  }, []);

  return (
    <>
      <Nav/>
      <Hero/>
      <div className="stitch"/>
      <Curriculum/>
      <div className="stitch"/>
      <Factory/>
      <div className="stitch"/>
      <Subjects/>
      <div className="stitch"/>
      <Life/>
      <div className="stitch"/>
      <Alumni/>
      <div className="stitch"/>
      <Alur/>
      <div className="stitch"/>
      <FAQ/>
      <Daftar/>
      <Footer/>

      <a className="fab-wa" href="https://wa.me/6282289991200" target="_blank" rel="noopener" aria-label="WhatsApp">
        <i className="bi bi-whatsapp"></i>
      </a>

      {showTweaks && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setShowTweaks(false)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
