<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Artikel — HelloMotion High School Malang</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QMY66L0590"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QMY66L0590');
  </script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800;900&family=Caveat:wght@400;700&display=swap');
:root {
  --hm-pink: #E66571; --hm-pink-deep: #D94A5A; --hm-pink-soft: #F7C2C9; --hm-pink-tint: #FDEBED;
  --hm-yellow: #F4B232; --hm-yellow-deep: #E89A10; --hm-yellow-soft: #FBE3A8; --hm-yellow-tint: #FEF6E0;
  --hm-mint: #35BE92; --hm-mint-deep: #1D9E76; --hm-mint-soft: #A4E6CE; --hm-mint-tint: #E3F7EE;
  --hm-navy: #0F3A48; --hm-navy-2: #1A5567; --hm-ink: #0A252F;
  --hm-cream: #FFF8EA; --hm-paper: #FFFFFF; --hm-muted: #6B8390; --hm-border: #E8DFCC;
  --bg-page: var(--hm-cream); --bg-card: var(--hm-paper);
  --fg-1: var(--hm-navy); --fg-2: var(--hm-navy-2); --fg-3: var(--hm-muted);
  --font-display: 'Onest', system-ui, sans-serif; --font-body: 'Onest', system-ui, sans-serif;
  --font-accent: 'Caveat', cursive;
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px; --r-2xl: 36px; --r-pill: 9999px;
  --sh-sm: 0 2px 6px rgba(15,58,72,0.06); --sh-md: 0 10px 24px rgba(15,58,72,0.08); --sh-lg: 0 22px 50px rgba(15,58,72,0.12);
  --ease-out: cubic-bezier(0.2,0.7,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin:0; padding:0; font-family: var(--font-body); color: var(--fg-1); background: var(--bg-page); -webkit-font-smoothing: antialiased; line-height: 1.5; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
h1,h2,h3,h4,h5 { font-family: var(--font-display); color: var(--fg-1); letter-spacing: -0.02em; margin: 0; line-height: 1.1; font-weight: 800; }
p { margin: 0; color: var(--fg-2); }
::selection { background: var(--hm-yellow); color: var(--hm-navy); }
.container { max-width: 1240px; margin: 0 auto; padding: 0 28px; }
.btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 24px; border-radius: var(--r-pill); font-weight: 700; font-size: 15px; transition: transform 0.2s, box-shadow 0.2s, background 0.2s; white-space: nowrap; }
.btn:hover { transform: translateY(-2px); }
.btn-ghost { background: transparent; color: var(--fg-1); border: 2px solid var(--hm-navy); }
.btn-sm { padding: 10px 18px; font-size: 14px; }
.btn-primary { background: var(--hm-pink); color: white; box-shadow: 0 6px 0 0 rgba(15,58,72,0.14); }
.btn-primary:hover { background: var(--hm-pink-deep); }
.chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: var(--r-pill); font-size: 13px; font-weight: 600; background: var(--hm-paper); color: var(--hm-navy); border: 1.5px solid var(--hm-border); }
.chip-pink { background: var(--hm-pink); color: white; border-color: transparent; }
.chip-yellow { background: var(--hm-yellow); color: var(--hm-navy); border-color: transparent; }
.chip-mint { background: var(--hm-mint); color: white; border-color: transparent; }

/* Nav */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 14px 0; transition: background 0.3s, backdrop-filter 0.3s, box-shadow 0.3s; }
.nav--scrolled { background: color-mix(in oklab, var(--bg-page) 82%, transparent); backdrop-filter: blur(14px); box-shadow: 0 1px 0 var(--hm-border); }
.nav__inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.nav__brand { display: flex; align-items: center; gap: 12px; }
.nav__logomark { display: inline-flex; }
.nav__wordmark { display: flex; flex-direction: column; line-height: 1; }
.nav__wordmark strong { font-size: 18px; font-weight: 800; color: var(--fg-1); letter-spacing: -0.02em; }
.nav__wordmark small { font-size: 11px; color: var(--fg-3); font-weight: 500; margin-top: 3px; }
.nav__links { display: flex; align-items: center; gap: 4px; }
.nav__link { padding: 10px 14px; font-size: 14px; font-weight: 600; color: var(--fg-2); border-radius: var(--r-pill); transition: background 0.2s, color 0.2s; }
.nav__link:hover { background: var(--hm-yellow-tint); color: var(--fg-1); }
.nav__cta { margin-left: 10px; }
.nav__burger { display: none; flex-direction: column; gap: 5px; width: 40px; height: 40px; justify-content: center; align-items: center; }
.nav__burger span { display: block; width: 22px; height: 2.5px; background: var(--fg-1); border-radius: 2px; }
@media (max-width: 880px) {
  .nav__burger { display: flex; }
  .nav__links { position: absolute; top: 68px; left: 12px; right: 12px; flex-direction: column; align-items: stretch; gap: 4px; padding: 14px; border-radius: var(--r-xl); background: var(--bg-card); box-shadow: var(--sh-lg); transform: translateY(-8px); opacity: 0; pointer-events: none; transition: transform 0.25s, opacity 0.25s; }
  .nav__links--open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .nav__link { text-align: left; padding: 12px 16px; }
  .nav__cta { margin: 4px 0 0 0; justify-content: center; }
  .nav__wordmark small { display: none; }
}

/* Article */
.article { max-width: 820px; margin: 0 auto; }
.article__cover { width: 100%; height: 420px; object-fit: cover; border-radius: var(--r-xl); margin-bottom: 32px; }
@media (max-width: 640px) { .article__cover { height: 240px; } }
.article__meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
.article__meta span { font-size: 13px; color: var(--fg-3); }
.article__title { font-size: clamp(28px, 4.5vw, 44px); font-weight: 900; line-height: 1.12; margin-bottom: 32px; }
.article__body { font-size: 17px; line-height: 1.85; color: var(--fg-2); }
.article__body h2 { font-size: 24px; margin: 36px 0 14px; color: var(--fg-1); }
.article__body h3 { font-size: 20px; margin: 28px 0 10px; color: var(--fg-1); }
.article__body blockquote { border-left: 4px solid var(--hm-pink); padding: 14px 22px; margin: 24px 0; background: var(--hm-pink-tint); border-radius: 0 var(--r-md) var(--r-md) 0; font-style: italic; }
.article__body ul { padding-left: 22px; margin: 14px 0; }
.article__body li { margin-bottom: 6px; }
.article__body p { margin-bottom: 16px; }
.article__share { margin-top: 48px; padding-top: 28px; border-top: 2px dashed var(--hm-border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.share-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: transform 0.2s, background 0.2s; }
.share-btn:hover { transform: translateY(-3px); }

/* Footer */
.footer { background: var(--hm-navy); color: var(--hm-cream); padding: 80px 0 40px; }
.footer__grid { display: grid; grid-template-columns: 1.4fr repeat(3, 1fr); gap: 40px; }
@media (max-width: 900px) { .footer__grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 540px) { .footer__grid { grid-template-columns: 1fr; } }
.footer__brand { max-width: 340px; }
.footer__brand h4 { color: var(--hm-cream); font-size: 22px; margin-bottom: 10px; }
.footer__brand p { color: rgba(255,248,234,0.65); font-size: 14px; line-height: 1.6; }
.footer__social { display: flex; gap: 10px; margin-top: 20px; }
.footer__social a { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: var(--hm-cream); font-size: 18px; transition: background 0.2s, transform 0.2s; }
.footer__social a:hover { background: var(--hm-pink); transform: translateY(-3px); }
.footer__col h5 { color: var(--hm-yellow); font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; font-weight: 800; }
.footer__col a, .footer__col p { display: block; color: rgba(255,248,234,0.75); font-size: 14px; padding: 6px 0; transition: color 0.2s; }
.footer__col a:hover { color: var(--hm-yellow); }
.footer__copy { margin-top: 56px; padding-top: 28px; border-top: 1px solid rgba(255,255,255,0.12); display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; color: rgba(255,248,234,0.5); font-size: 13px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.6/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
<script type="text/babel" data-presets="react">

const STRAPI_URL = window.STRAPI_URL || 'http://localhost:1337';
const API = `${STRAPI_URL}/api`;

async function fetchAPI(endpoint) {
  try {
    const res = await fetch(`${API}${endpoint}`, { headers: { 'Content-Type': 'application/json' } });
    if (!res.ok) throw new Error(`API ${res.status}`);
    return await res.json();
  } catch (err) { console.warn('CMS fetch failed:', err.message); return null; }
}

const CATEGORIES = { berita: 'Berita', kegiatan: 'Kegiatan', prestasi: 'Prestasi', tips: 'Tips', pengumuman: 'Pengumuman' };
const CAT_COLORS = { berita: 'chip-pink', kegiatan: 'chip-mint', prestasi: 'chip-yellow', tips: '', pengumuman: 'chip-pink' };
const formatDate = (d) => new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

const renderMarkdown = (md) => {
  if (!md) return '';
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hublp])(.+)$/gm, '<p>$1</p>');
};

/* ── Nav ─────────────────────────── */
const Nav = () => {
  const [scrolled, setScrolled] = React.useState(false);
  const [open, setOpen] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = [
    ['Tentang', 'about'], ['Kurikulum', 'curriculum'], ['Creative Factory', 'factory'],
    ['Kehidupan', 'life'], ['Alumni', 'alumni'], ['FAQ', 'faq'],
  ];

  return (
    <nav className={`nav ${scrolled ? 'nav--scrolled' : ''}`}>
      <div className="nav__inner container">
        <a className="nav__brand" href="index.html">
          <span className="nav__logomark">
            <svg viewBox="0 0 40 40" width="40" height="40">
              <circle cx="20" cy="20" r="19" fill="var(--hm-yellow)" />
              <circle cx="14" cy="17" r="2.2" fill="var(--hm-navy)" />
              <circle cx="26" cy="17" r="2.2" fill="var(--hm-navy)" />
              <path d="M13 24 Q20 30 27 24" stroke="var(--hm-navy)" strokeWidth="2.5" fill="none" strokeLinecap="round" />
            </svg>
          </span>
          <span className="nav__wordmark">
            <strong>HelloMotion</strong>
            <small>High School Malang</small>
          </span>
        </a>
        <div className={`nav__links ${open ? 'nav__links--open' : ''}`}>
          {links.map(([label, id]) => (
            <a key={id} className="nav__link" href={`index.html#${id}`}>{label}</a>
          ))}
          <a href="blog.html" className="nav__link" style={{color: 'var(--hm-pink)', fontWeight: 700}}>Blog</a>
          <a className="btn btn-primary btn-sm nav__cta" href="index.html#daftar">
            Daftar PPDB <i className="bi bi-arrow-right"></i>
          </a>
        </div>
        <button className="nav__burger" onClick={() => setOpen(o => !o)} aria-label="menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  );
};

/* ── Footer ──────────────────────── */
const Footer = () => {
  const [s, setS] = React.useState({
    school_name: 'HelloMotion High School Malang',
    tagline: 'SMA kreatif pertama di Indonesia. Membentuk generasi kreatif, kritis, dan berbudi pekerti — siap jadi pemimpin di abad 21.',
    whatsapp: '6282289991200', instagram: 'hellomotion.malang', tiktok: '', youtube: '',
    website: 'hellomotion.sch.id',
    address: 'Gedung Malang Creative Center (MCC)\nLantai 5, Kawasan KEK Singhasari\nMalang, Jawa Timur',
    footer_text: '© 2026 HelloMotion High School. All rights reserved.',
  });
  React.useEffect(() => { fetchAPI('/site-setting?status=published').then(res => { if (res?.data) setS(res.data); }); }, []);

  return (
    <footer className="footer">
      <div className="container footer__grid">
        <div className="footer__brand">
          <h4>{s.school_name}</h4>
          <p>{s.tagline}</p>
          <div className="footer__social">
            {s.instagram && <a href={`https://instagram.com/${s.instagram}`} target="_blank" rel="noopener" aria-label="Instagram"><i className="bi bi-instagram"></i></a>}
            {s.tiktok && <a href={`https://tiktok.com/@${s.tiktok}`} target="_blank" rel="noopener" aria-label="TikTok"><i className="bi bi-tiktok"></i></a>}
            {s.youtube && <a href={s.youtube} target="_blank" rel="noopener" aria-label="YouTube"><i className="bi bi-youtube"></i></a>}
            {s.whatsapp && <a href={`https://wa.me/${s.whatsapp}`} target="_blank" rel="noopener" aria-label="WhatsApp"><i className="bi bi-whatsapp"></i></a>}
          </div>
        </div>
        <div className="footer__col">
          <h5>Kontak</h5>
          {s.whatsapp && <a href={`https://wa.me/${s.whatsapp}`}>WA: {s.whatsapp.replace(/^62/, '0').replace(/(\d{4})(\d{4})(\d+)/, '$1 $2 $3')}</a>}
          {s.instagram && <a href={`https://instagram.com/${s.instagram}`}>@{s.instagram}</a>}
          {s.website && <a href={`https://${s.website}`}>{s.website}</a>}
        </div>
        <div className="footer__col">
          <h5>Alamat</h5>
          <p>{(s.address || '').split('\n').map((line, i, arr) => <React.Fragment key={i}>{line}{i < arr.length - 1 && <br/>}</React.Fragment>)}</p>
        </div>
        <div className="footer__col">
          <h5>Info</h5>
          <a href="index.html#curriculum">Kurikulum</a>
          <a href="index.html#daftar">PPDB 2026/2027</a>
          <a href="index.html#faq">FAQ</a>
          <a href="blog.html">Blog</a>
        </div>
      </div>
      <div className="container footer__copy">
        <span>{s.footer_text}</span>
        <span>Dibuat dengan ♥ di Malang.</span>
      </div>
    </footer>
  );
};

/* ── Article Page ────────────────── */
const ArticlePage = () => {
  const [article, setArticle] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [related, setRelated] = React.useState([]);

  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    if (!slug) { setLoading(false); return; }

    fetchAPI(`/articles?filters[slug][$eq]=${slug}&populate=*&status=published`).then(res => {
      if (res?.data?.[0]) {
        const a = res.data[0];
        setArticle(a);
        document.title = `${a.title} — HelloMotion High School Malang`;

        // Fetch related articles (same category, exclude current)
        if (a.category) {
          fetchAPI(`/articles?filters[category][$eq]=${a.category}&filters[slug][$ne]=${slug}&sort=createdAt:desc&populate=*&status=published&pagination[limit]=3`).then(r => {
            if (r?.data) setRelated(r.data);
          });
        }
      }
      setLoading(false);
    });
  }, []);

  if (loading) {
    return (
      <>
        <Nav />
        <main className="container" style={{paddingTop: 120, paddingBottom: 80, textAlign: 'center', minHeight: '60vh'}}>
          <p style={{color: 'var(--fg-3)', fontSize: 18}}>Memuat artikel...</p>
        </main>
        <Footer />
      </>
    );
  }

  if (!article) {
    return (
      <>
        <Nav />
        <main className="container" style={{paddingTop: 120, paddingBottom: 80, textAlign: 'center', minHeight: '60vh'}}>
          <h1 style={{fontSize: 32, marginBottom: 16}}>Artikel tidak ditemukan</h1>
          <p style={{color: 'var(--fg-3)', marginBottom: 28}}>Artikel yang kamu cari tidak ada atau sudah dihapus.</p>
          <a href="blog.html" className="btn btn-ghost btn-sm"><i className="bi bi-arrow-left"></i> Kembali ke Blog</a>
        </main>
        <Footer />
      </>
    );
  }

  const a = article;
  const coverUrl = a.cover?.url ? `${STRAPI_URL}${a.cover.url}` : null;
  const shareUrl = window.location.href;

  return (
    <>
      <Nav />
      <main style={{paddingTop: 100, paddingBottom: 80}}>
        <div className="container">
          <div className="article">
            <a href="blog.html" className="btn btn-ghost btn-sm" style={{marginBottom: 28}}>
              <i className="bi bi-arrow-left"></i> Semua Artikel
            </a>

            {coverUrl && <img src={coverUrl} alt={a.title} className="article__cover" />}

            <div className="article__meta">
              {a.category && <span className={`chip ${CAT_COLORS[a.category] || ''}`}>{CATEGORIES[a.category] || a.category}</span>}
              {a.author && <span>oleh <strong>{a.author}</strong></span>}
              <span>{formatDate(a.publishedAt || a.createdAt)}</span>
            </div>

            <h1 className="article__title">{a.title}</h1>

            <div className="article__body" dangerouslySetInnerHTML={{__html: renderMarkdown(a.content)}} />

            <div className="article__share">
              <span style={{fontSize: 14, fontWeight: 700, color: 'var(--fg-3)'}}>Bagikan:</span>
              <a href={`https://wa.me/?text=${encodeURIComponent(a.title + ' ' + shareUrl)}`} target="_blank" rel="noopener" className="share-btn" style={{background: '#25D366', color: 'white'}} aria-label="WhatsApp">
                <i className="bi bi-whatsapp"></i>
              </a>
              <a href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`} target="_blank" rel="noopener" className="share-btn" style={{background: '#1877F2', color: 'white'}} aria-label="Facebook">
                <i className="bi bi-facebook"></i>
              </a>
              <a href={`https://twitter.com/intent/tweet?text=${encodeURIComponent(a.title)}&url=${encodeURIComponent(shareUrl)}`} target="_blank" rel="noopener" className="share-btn" style={{background: '#1DA1F2', color: 'white'}} aria-label="Twitter">
                <i className="bi bi-twitter-x"></i>
              </a>
              <button className="share-btn" style={{background: 'var(--hm-navy)', color: 'var(--hm-cream)'}} onClick={() => { navigator.clipboard.writeText(shareUrl); alert('Link disalin!'); }} aria-label="Copy link">
                <i className="bi bi-link-45deg"></i>
              </button>
            </div>
          </div>

          {related.length > 0 && (
            <div style={{marginTop: 64}}>
              <h2 style={{fontSize: 24, marginBottom: 24}}>Artikel Terkait</h2>
              <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 20}}>
                {related.map(r => {
                  const rCover = r.cover?.url ? `${STRAPI_URL}${r.cover.url}` : null;
                  return (
                    <a key={r.slug} href={`article.html?slug=${r.slug}`} style={{display: 'block', background: 'var(--bg-card)', borderRadius: 'var(--r-xl)', border: '1.5px solid var(--hm-border)', overflow: 'hidden', transition: 'transform 0.2s', textDecoration: 'none', color: 'inherit'}}>
                      {rCover ? <img src={rCover} alt={r.title} style={{width: '100%', height: 160, objectFit: 'cover'}} /> : <div style={{height: 160, background: 'linear-gradient(135deg, var(--hm-pink-tint), var(--hm-yellow-tint))'}}></div>}
                      <div style={{padding: '16px 20px'}}>
                        <h4 style={{fontSize: 16, fontWeight: 700, lineHeight: 1.3, marginBottom: 6}}>{r.title}</h4>
                        <span style={{fontSize: 12, color: 'var(--fg-3)'}}>{formatDate(r.publishedAt || r.createdAt)}</span>
                      </div>
                    </a>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </main>
      <Footer />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ArticlePage />);

</script>
</body>
</html>
