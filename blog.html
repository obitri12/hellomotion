<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — HelloMotion High School Malang</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QMY66L0590"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QMY66L0590');
  </script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800;900&family=Caveat:wght@400;700&display=swap');
:root {
  --hm-pink: #E66571; --hm-pink-deep: #D94A5A; --hm-pink-soft: #F7C2C9; --hm-pink-tint: #FDEBED;
  --hm-yellow: #F4B232; --hm-yellow-deep: #E89A10; --hm-yellow-soft: #FBE3A8; --hm-yellow-tint: #FEF6E0;
  --hm-mint: #35BE92; --hm-mint-deep: #1D9E76; --hm-mint-soft: #A4E6CE; --hm-mint-tint: #E3F7EE;
  --hm-navy: #0F3A48; --hm-navy-2: #1A5567; --hm-ink: #0A252F;
  --hm-cream: #FFF8EA; --hm-paper: #FFFFFF; --hm-muted: #6B8390; --hm-border: #E8DFCC;
  --bg-page: var(--hm-cream); --bg-card: var(--hm-paper);
  --fg-1: var(--hm-navy); --fg-2: var(--hm-navy-2); --fg-3: var(--hm-muted);
  --font-display: 'Onest', system-ui, sans-serif; --font-body: 'Onest', system-ui, sans-serif;
  --font-accent: 'Caveat', cursive;
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px; --r-2xl: 36px; --r-pill: 9999px;
  --sh-sm: 0 2px 6px rgba(15,58,72,0.06); --sh-md: 0 10px 24px rgba(15,58,72,0.08); --sh-lg: 0 22px 50px rgba(15,58,72,0.12);
  --ease-out: cubic-bezier(0.2,0.7,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin:0; padding:0; font-family: var(--font-body); color: var(--fg-1); background: var(--bg-page); -webkit-font-smoothing: antialiased; line-height: 1.5; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
h1,h2,h3,h4,h5 { font-family: var(--font-display); color: var(--fg-1); letter-spacing: -0.02em; margin: 0; line-height: 1.1; font-weight: 800; }
p { margin: 0; color: var(--fg-2); }
::selection { background: var(--hm-yellow); color: var(--hm-navy); }
.container { max-width: 1240px; margin: 0 auto; padding: 0 28px; }
.btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 24px; border-radius: var(--r-pill); font-weight: 700; font-size: 15px; transition: transform 0.2s, box-shadow 0.2s, background 0.2s; white-space: nowrap; }
.btn:hover { transform: translateY(-2px); }
.btn-ghost { background: transparent; color: var(--fg-1); border: 2px solid var(--hm-navy); }
.btn-sm { padding: 10px 18px; font-size: 14px; }
.chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: var(--r-pill); font-size: 13px; font-weight: 600; background: var(--hm-paper); color: var(--hm-navy); border: 1.5px solid var(--hm-border); }
.chip-pink { background: var(--hm-pink); color: white; border-color: transparent; }
.chip-yellow { background: var(--hm-yellow); color: var(--hm-navy); border-color: transparent; }
.chip-mint { background: var(--hm-mint); color: white; border-color: transparent; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-accent); font-size: 28px; font-weight: 700; color: var(--hm-pink); transform: rotate(-2deg); }

/* Nav */
.blog-nav { padding: 20px 0; border-bottom: 1.5px solid var(--hm-border); margin-bottom: 40px; }
.blog-nav__inner { display: flex; align-items: center; justify-content: space-between; }
.blog-nav__brand { display: flex; align-items: center; gap: 12px; }
.blog-nav__brand strong { font-size: 18px; font-weight: 800; }
.blog-nav__brand small { font-size: 11px; color: var(--fg-3); }

/* Cards */
.blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
@media (max-width: 540px) { .blog-grid { grid-template-columns: 1fr; } }
.blog-card { background: var(--bg-card); border-radius: var(--r-xl); border: 1.5px solid var(--hm-border); overflow: hidden; transition: transform 0.25s var(--ease-out), box-shadow 0.25s; cursor: pointer; }
.blog-card:hover { transform: translateY(-6px); box-shadow: var(--sh-lg); }
.blog-card__cover { width: 100%; height: 220px; object-fit: cover; }
.blog-card__placeholder { width: 100%; height: 220px; background: linear-gradient(135deg, var(--hm-pink-tint), var(--hm-yellow-tint)); display: flex; align-items: center; justify-content: center; }
.blog-card__body { padding: 22px 24px 24px; }
.blog-card__tags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.blog-card__title { font-size: 18px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; }
.blog-card__excerpt { font-size: 14px; color: var(--fg-3); line-height: 1.55; }
.blog-card__footer { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; }
.blog-card__date { font-size: 12px; color: var(--fg-3); }
.blog-card__read { font-size: 13px; font-weight: 700; color: var(--hm-pink); }

/* Article detail */
.article { max-width: 820px; margin: 0 auto; }
.article__cover { width: 100%; height: 400px; object-fit: cover; border-radius: var(--r-xl); margin-bottom: 32px; }
.article__meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
.article__meta span { font-size: 13px; color: var(--fg-3); }
.article__title { font-size: clamp(28px, 4.5vw, 44px); font-weight: 900; line-height: 1.12; margin-bottom: 32px; }
.article__body { font-size: 17px; line-height: 1.85; color: var(--fg-2); }
.article__body h2 { font-size: 24px; margin: 36px 0 14px; color: var(--fg-1); }
.article__body h3 { font-size: 20px; margin: 28px 0 10px; color: var(--fg-1); }
.article__body blockquote { border-left: 4px solid var(--hm-pink); padding: 14px 22px; margin: 24px 0; background: var(--hm-pink-tint); border-radius: 0 var(--r-md) var(--r-md) 0; font-style: italic; }
.article__body ul { padding-left: 22px; margin: 14px 0; }
.article__body li { margin-bottom: 6px; }

/* Filter */
.blog-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.filter-btn { padding: 8px 18px; border-radius: var(--r-pill); font-size: 13px; font-weight: 600; background: var(--bg-card); border: 1.5px solid var(--hm-border); color: var(--fg-2); transition: all 0.2s; cursor: pointer; }
.filter-btn:hover { border-color: var(--hm-pink); color: var(--hm-pink); }
.filter-btn.active { background: var(--hm-pink); color: white; border-color: var(--hm-pink); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.6/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
<script type="text/babel" data-presets="react">

const STRAPI_URL = window.STRAPI_URL || 'http://localhost:1337';
const API = `${STRAPI_URL}/api`;

async function fetchAPI(endpoint) {
  try {
    const res = await fetch(`${API}${endpoint}`, { headers: { 'Content-Type': 'application/json' } });
    if (!res.ok) throw new Error(`API ${res.status}`);
    return await res.json();
  } catch (err) { console.warn('CMS fetch failed:', err.message); return null; }
}

const CATEGORIES = { berita: 'Berita', kegiatan: 'Kegiatan', prestasi: 'Prestasi', tips: 'Tips', pengumuman: 'Pengumuman' };
const CAT_COLORS = { berita: 'chip-pink', kegiatan: 'chip-mint', prestasi: 'chip-yellow', tips: '', pengumuman: 'chip-pink' };

const formatDate = (d) => new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
const shortDate = (d) => new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });

const renderMarkdown = (md) => {
  if (!md) return '';
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '<br/><br/>');
};

/* ── Nav ─────────────────────────── */
const BlogNav = () => (
  <nav className="blog-nav">
    <div className="container blog-nav__inner">
      <a href="index.html" className="blog-nav__brand">
        <svg viewBox="0 0 40 40" width="36" height="36">
          <circle cx="20" cy="20" r="19" fill="var(--hm-yellow)" />
          <circle cx="14" cy="17" r="2.2" fill="var(--hm-navy)" />
          <circle cx="26" cy="17" r="2.2" fill="var(--hm-navy)" />
          <path d="M13 24 Q20 30 27 24" stroke="var(--hm-navy)" strokeWidth="2.5" fill="none" strokeLinecap="round" />
        </svg>
        <div>
          <strong>HelloMotion</strong><br/>
          <small>High School Malang</small>
        </div>
      </a>
      <div style={{display: 'flex', gap: 8}}>
        <a href="index.html" className="btn btn-ghost btn-sm"><i className="bi bi-house"></i> Home</a>
      </div>
    </div>
  </nav>
);

/* ── Article Detail ──────────────── */
const ArticleDetail = ({ article, onBack }) => {
  const a = article;
  const coverUrl = a.cover?.url ? `${STRAPI_URL}${a.cover.url}` : null;

  return (
    <div className="article">
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom: 28}}>
        <i className="bi bi-arrow-left"></i> Semua Artikel
      </button>
      {coverUrl && <img src={coverUrl} alt={a.title} className="article__cover" />}
      <div className="article__meta">
        {a.category && <span className={`chip ${CAT_COLORS[a.category] || ''}`}>{CATEGORIES[a.category] || a.category}</span>}
        {a.author && <span>oleh <strong>{a.author}</strong></span>}
        <span>{formatDate(a.publishedAt || a.createdAt)}</span>
      </div>
      <h1 className="article__title">{a.title}</h1>
      <div className="article__body" dangerouslySetInnerHTML={{__html: renderMarkdown(a.content)}} />
    </div>
  );
};

/* ── Article Card ────────────────── */
const ArticleCard = ({ article, onClick }) => {
  const a = article;
  const coverUrl = a.cover?.url ? `${STRAPI_URL}${a.cover.url}` : null;

  return (
    <article className="blog-card" onClick={onClick}>
      {coverUrl ? (
        <img src={coverUrl} alt={a.title} className="blog-card__cover" />
      ) : (
        <div className="blog-card__placeholder">
          <i className="bi bi-newspaper" style={{fontSize: 48, color: 'var(--hm-pink)', opacity: 0.4}}></i>
        </div>
      )}
      <div className="blog-card__body">
        <div className="blog-card__tags">
          {a.category && <span className={`chip ${CAT_COLORS[a.category] || ''}`} style={{fontSize: 11}}>{CATEGORIES[a.category] || a.category}</span>}
          {a.featured && <span className="chip chip-yellow" style={{fontSize: 11}}>⭐ Featured</span>}
        </div>
        <h3 className="blog-card__title">{a.title}</h3>
        <p className="blog-card__excerpt">{a.excerpt}</p>
        <div className="blog-card__footer">
          <span className="blog-card__date">{shortDate(a.publishedAt || a.createdAt)}</span>
          <span className="blog-card__read">Baca selengkapnya →</span>
        </div>
      </div>
    </article>
  );
};

/* ── Blog App ────────────────────── */
const BlogApp = () => {
  const [articles, setArticles] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [selected, setSelected] = React.useState(null);
  const [filter, setFilter] = React.useState('all');

  React.useEffect(() => {
    fetchAPI('/articles?sort=createdAt:desc&populate=*&status=published').then(res => {
      if (res?.data) setArticles(res.data);
      setLoading(false);
    });
  }, []);

  const filtered = filter === 'all' ? articles : articles.filter(a => a.category === filter);

  return (
    <>
      <BlogNav />
      <main className="container" style={{paddingTop: 20, paddingBottom: 80, minHeight: '70vh'}}>
        {selected ? (
          <ArticleDetail article={selected} onBack={() => { setSelected(null); window.scrollTo(0, 0); }} />
        ) : (
          <>
            <div style={{textAlign: 'center', maxWidth: 640, margin: '0 auto 40px'}}>
              <span className="section-eyebrow">Blog ✎</span>
              <h1 style={{fontSize: 'clamp(32px, 5vw, 48px)', fontWeight: 900, marginTop: 8}}>
                Berita &amp; Artikel
              </h1>
              <p style={{marginTop: 14, fontSize: 17, color: 'var(--fg-2)'}}>
                Info terkini seputar HelloMotion, tips pendidikan, dan cerita inspiratif.
              </p>
            </div>

            <div className="blog-filters">
              {[['all', 'Semua'], ...Object.entries(CATEGORIES)].map(([key, label]) => (
                <button key={key} className={`filter-btn ${filter === key ? 'active' : ''}`} onClick={() => setFilter(key)}>
                  {label}
                </button>
              ))}
            </div>

            {loading ? (
              <p style={{textAlign: 'center', color: 'var(--fg-3)', padding: 40}}>Memuat artikel...</p>
            ) : filtered.length === 0 ? (
              <p style={{textAlign: 'center', color: 'var(--fg-3)', padding: 40}}>
                {filter === 'all' ? 'Belum ada artikel. Tambahkan di CMS.' : `Belum ada artikel kategori "${CATEGORIES[filter]}".`}
              </p>
            ) : (
              <div className="blog-grid">
                {filtered.map(a => (
                  <ArticleCard key={a.slug || a.id} article={a} onClick={() => { setSelected(a); window.scrollTo(0, 0); }} />
                ))}
              </div>
            )}
          </>
        )}
      </main>

      <footer style={{background: 'var(--hm-navy)', color: 'var(--hm-cream)', padding: '28px 0', textAlign: 'center', fontSize: 13}}>
        <div className="container">
          <span>© 2026 HelloMotion High School Malang</span>
          <span style={{margin: '0 12px'}}>·</span>
          <a href="index.html" style={{color: 'var(--hm-yellow)'}}>Kembali ke Home</a>
        </div>
      </footer>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<BlogApp />);

</script>
</body>
</html>
